name: DevOps CI/CD Pipeline BSE-8B

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        cd app
        npm install

    - name: Run Unit Tests
      run: |
        cd app
        npm test

    - name: Security Scan with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Build Docker Image
      run: |
        docker build -t devops-app:v1 -f docker/Dockerfile .

    - name: Deployment Success
      run: echo "Pipeline complete successfully"
