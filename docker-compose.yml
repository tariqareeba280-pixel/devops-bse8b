version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: devopsdb
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./app/backend
    container_name: backend
    ports:
      - "3001:5000"
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/devopsdb
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./app/frontend
    container_name: frontend
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  mongo_data:
